name: Scan

on:
  workflow_dispatch:
    inputs:
      fail_on_critical:
        description: "Fail the workflow if CRITICAL CVEs are found"
        type: boolean
        default: true

permissions:
  contents: write
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install yq
        uses: mikefarah/yq@0f4fb8d35ec1a939d78dd6862f494d19ec589f19 # v4.52.5

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Log in to ACR
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_CLIENT_ID: ${{ secrets.ACR_CLIENT_ID }}
          ACR_CLIENT_SECRET: ${{ secrets.ACR_CLIENT_SECRET }}
        run: |
          echo "${ACR_CLIENT_SECRET}" | docker login "${ACR_LOGIN_SERVER}" \
            --username "${ACR_CLIENT_ID}" \
            --password-stdin

      - name: Scan images and update report
        id: scan
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          FAIL_ON_CRITICAL: ${{ inputs.fail_on_critical }}
        run: |
          set -euo pipefail

          REPORT="docs/sync-report.json"
          FOUND_CRITICAL=false
          COUNT=$(yq '.images | length' catalog.yaml)

          # Build a fresh scans array — only entries for images currently in catalog.yaml.
          # This automatically removes stale entries from previous registry names or removed images.
          NEW_SCANS="[]"

          for i in $(seq 0 $((COUNT - 1))); do
            TARGET=$(yq ".images[$i].target" catalog.yaml)
            TAG=$(yq ".images[$i].tag" catalog.yaml)
            IMAGE="${TARGET}:${TAG}"

            echo "::group::Scanning ${IMAGE}"

            # Run Trivy; keep stderr visible in the workflow log for diagnostics
            TRIVY_OUTPUT=$(mktemp --suffix=.json)
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:0.69.3 \
              image \
              --format json \
              --output /dev/stdout \
              --exit-code 0 \
              "${IMAGE}" > "${TRIVY_OUTPUT}" || true

            # Validate Trivy produced usable JSON before parsing counts
            if ! jq -e '.Results' "${TRIVY_OUTPUT}" > /dev/null 2>&1; then
              echo "::warning::Trivy output for ${IMAGE} is missing or invalid — skipping scan entry for this image"
              rm -f "${TRIVY_OUTPUT}"
              echo "::endgroup::"
              continue
            fi

            # Summarise counts by severity
            CRITICAL_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "${TRIVY_OUTPUT}")
            HIGH_COUNT=$(jq     '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")]     | length' "${TRIVY_OUTPUT}")
            MEDIUM_COUNT=$(jq   '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")]   | length' "${TRIVY_OUTPUT}")
            LOW_COUNT=$(jq      '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")]      | length' "${TRIVY_OUTPUT}")

            echo "  CRITICAL=${CRITICAL_COUNT} HIGH=${HIGH_COUNT} MEDIUM=${MEDIUM_COUNT} LOW=${LOW_COUNT}"

            if [[ "${CRITICAL_COUNT}" -gt 0 ]]; then
              FOUND_CRITICAL=true
            fi

            SCANNED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            ENTRY=$(jq -n \
              --arg target       "${TARGET}" \
              --arg tag          "${TAG}" \
              --argjson critical "${CRITICAL_COUNT}" \
              --argjson high     "${HIGH_COUNT}" \
              --argjson medium   "${MEDIUM_COUNT}" \
              --argjson low      "${LOW_COUNT}" \
              --arg scanned_at   "${SCANNED_AT}" \
              '{target: $target, tag: $tag, critical: $critical, high: $high, medium: $medium, low: $low, scanned_at: $scanned_at}')

            NEW_SCANS=$(echo "${NEW_SCANS}" | jq ". + [\$entry]" --argjson entry "${ENTRY}")

            rm -f "${TRIVY_OUTPUT}"
            echo "::endgroup::"
          done

          # Replace .scans wholesale with only the current catalog's results
          CURRENT=$(cat "${REPORT}")
          echo "${CURRENT}" | jq --argjson scans "${NEW_SCANS}" '.scans = $scans' \
            > "${REPORT}.tmp" && mv "${REPORT}.tmp" "${REPORT}"

          echo "found_critical=${FOUND_CRITICAL}" >> "${GITHUB_OUTPUT}"

      - name: Commit updated report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/sync-report.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore: update scan results in sync-report.json [skip ci]"
            git push
          fi

      - name: Fail on CRITICAL CVEs
        if: steps.scan.outputs.found_critical == 'true' && inputs.fail_on_critical == true
        run: |
          echo "::error::One or more images contain CRITICAL CVEs. See docs/sync-report.json for details."
          exit 1
