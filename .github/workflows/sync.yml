name: Sync

on:
  # schedule:
  #   - cron: "0 2 * * *"   # nightly at 02:00 UTC
  workflow_dispatch:
    inputs:
      fail_on_critical:
        description: "Block image copy if CRITICAL CVEs are found"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install crane
        uses: imjasonh/setup-crane@6da1ae018866400525525ce74ff892880c099987 # v0.5

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "3.16.2"

      - name: Install yq
        uses: mikefarah/yq@0f4fb8d35ec1a939d78dd6862f494d19ec589f19 # v4.52.5

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.57.1

      - name: Log in to ACR
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_CLIENT_ID: ${{ secrets.ACR_CLIENT_ID }}
          ACR_CLIENT_SECRET: ${{ secrets.ACR_CLIENT_SECRET }}
        run: |
          echo "${ACR_CLIENT_SECRET}" | docker login "${ACR_LOGIN_SERVER}" \
            --username "${ACR_CLIENT_ID}" \
            --password-stdin

      - name: Log in to ACR (Helm / OCI)
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_CLIENT_ID: ${{ secrets.ACR_CLIENT_ID }}
          ACR_CLIENT_SECRET: ${{ secrets.ACR_CLIENT_SECRET }}
        run: |
          echo "${ACR_CLIENT_SECRET}" | helm registry login "${ACR_LOGIN_SERVER}" \
            --username "${ACR_CLIENT_ID}" \
            --password-stdin

      - name: Sync images
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          SCAN_FAIL_ON_CRITICAL: ${{ inputs.fail_on_critical }}
        run: bash scripts/sync-images.sh catalog.yaml

      - name: Sync charts
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: bash scripts/sync-charts.sh catalog.yaml

      - name: Generate sync report
        run: bash scripts/generate-report.sh

      - name: Commit sync report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/sync-report.json
          if git diff --cached --quiet; then
            echo "No changes to sync-report.json — skipping commit."
          else
            git commit -m "chore: update sync-report.json [skip ci]"
            git push
          fi
