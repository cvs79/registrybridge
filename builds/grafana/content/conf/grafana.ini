#################################### Paths ####################################
[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning

#################################### Server ###################################
[server]
protocol = http
http_addr =
http_port = 3000
domain = localhost
enforce_domain = false
root_url = %(protocol)s://%(domain)s:%(http_port)s/
router_logging = false
static_root_path = public
enable_gzip = true

#################################### Database #################################
[database]
# Uses SQLite by default; override with GF_DATABASE_* env vars for Postgres/MySQL.
type = sqlite3
path = grafana.db

#################################### Security #################################
[security]
# Override GF_SECURITY_ADMIN_USER / GF_SECURITY_ADMIN_PASSWORD in your deployment.
admin_user = admin
secret_key = SW2YcwTIb9zpOOhoPsMm
disable_gravatar = true
cookie_secure = false
cookie_samesite = lax
allow_embedding = false

#################################### Users ####################################
[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_role = Viewer

#################################### Auth #####################################
[auth]
disable_login_form = false
disable_signout_menu = false

[auth.anonymous]
enabled = false

#################################### Logging ##################################
[log]
mode = console
level = info
filters =

#################################### Alerting #################################
[alerting]
enabled = true

#################################### Explore ##################################
[explore]
enabled = true

#################################### Feature Toggles ##########################
[feature_toggles]
enable =
